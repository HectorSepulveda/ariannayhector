<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A & H | Sorpresa</title>
    <meta name="description" content="Tenemos una sorpresa para ti" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=MonteCarlo&display=swap" rel="stylesheet" />
    <style>
        :root {
            --ivory: #f5f0e8;
            --gold: #c8a86a;
            --gold-dark: #84662e;
            --forest: #1b2721;
            --forest-soft: #31443b;
            --font-display: "Cormorant Garamond", serif;
            --font-script: "MonteCarlo", "Parisienne", cursive;
        }

        * {
            box-sizing: border-box;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ivory);
            font-family: var(--font-display);
            background: #0f1713;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            background-image: url("assets/galeria-pre/IMG_6624.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 38%, rgba(245, 240, 232, 0.16) 0%, rgba(8, 14, 11, 0.68) 58%, rgba(8, 14, 11, 0.86) 100%);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(200, 168, 106, 0.12), rgba(15, 23, 19, 0.1) 38%, rgba(49, 68, 59, 0.22) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            width: min(320px, 74%);
            padding: 1.1rem 0.72rem;
            text-align: center;
            border-radius: 1.2rem;
            border: 1px solid rgba(233, 216, 187, 0.42);
            background: rgba(14, 21, 17, 0.47);
            backdrop-filter: blur(7px);
            box-shadow: 0 18px 52px rgba(0, 0, 0, 0.38);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.72rem;
            border-radius: 999px;
            border: 1px solid rgba(233, 216, 187, 0.45);
            color: rgba(245, 240, 232, 0.86);
            background: rgba(200, 168, 106, 0.16);
            letter-spacing: 0.11em;
            text-transform: uppercase;
            font-size: 0.66rem;
            margin-bottom: 0.7rem;
        }

        .envelope {
            width: min(190px, 56vw);
            margin: 0 auto 0.9rem;
            border-radius: 0.95rem;
            overflow: hidden;
            display: block;
            border: 1px solid rgba(233, 216, 187, 0.35);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.33);
            transition: transform .35s ease, box-shadow .35s ease;
        }

        .envelope img {
            display: block;
            width: 100%;
            transform: scale(1.3);
        }

        .hero-content:hover .envelope {
            transform: translateY(-3px);
            box-shadow: 0 20px 38px rgba(0, 0, 0, 0.4);
        }

        .access-form {
            display: grid;
            gap: 0.7rem;
            margin-top: 0.25rem;
            padding: 0.62rem;
            border-radius: 1rem;
            border: 1px solid rgba(233, 216, 187, 0.28);
            background: linear-gradient(160deg, rgba(24, 35, 29, 0.72), rgba(18, 27, 22, 0.6));
            box-shadow: inset 0 1px 0 rgba(255, 244, 219, 0.12);
        }

        .access-title {
            margin: 0;
            font-family: var(--font-display);
            color: rgba(245, 240, 232, 0.92);
            font-size: 0.84rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .access-input {
            width: 100%;
            padding: 0.58rem 0.8rem;
            border-radius: 999px;
            border: 1px solid rgba(200, 168, 106, 0.58);
            background: linear-gradient(180deg, rgba(246, 239, 226, 0.98), rgba(238, 228, 208, 0.95));
            color: #2e2312;
            text-align: center;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            box-shadow: inset 0 2px 8px rgba(66, 45, 15, 0.14), 0 6px 16px rgba(0, 0, 0, 0.2);
        }

        .access-input:focus {
            outline: 2px solid rgba(200, 168, 106, 0.8);
            outline-offset: 2px;
        }

        .access-input::placeholder {
            color: rgba(66, 50, 23, 0.7);
            letter-spacing: 0.16em;
        }

        .access-help {
            margin: 0.2rem 0 0;
            min-height: 1.3rem;
            font-size: 0.87rem;
            color: rgba(245, 240, 232, 0.88);
        }

        .access-help.error {
            color: #ffd6d6;
        }

        h1 {
            margin: 0 0 0.2rem;
            font-family: var(--font-script);
            font-size: clamp(2.35rem, 2.8vw + 1.7rem, 3.75rem);
            color: #f8f4eb;
            line-height: 1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        p {
            margin: 0 0 1rem;
            font-size: 1rem;
            color: rgba(245, 240, 232, 0.84);
        }

        .cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.64rem 1.2rem;
            border-radius: 999px;
            border: 1px solid rgba(107, 79, 28, 0.9);
            text-decoration: none;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            font-size: 0.73rem;
            font-weight: 600;
            color: #2f220f;
            background: linear-gradient(135deg, #e1bf7b 0%, #ba9145 52%, #8c6828 100%);
            box-shadow: inset 0 1px 0 rgba(255, 243, 214, 0.5), 0 11px 20px rgba(70, 50, 20, 0.4);
            transition: transform .25s ease, box-shadow .25s ease;
        }

        .cta#access-submit {
            width: 100%;
            min-height: 2.2rem;
            font-family: var(--font-display);
            font-size: 0.72rem;
            letter-spacing: 0.16em;
        }

        .cta:hover {
            transform: translateY(-1px);
            box-shadow: inset 0 1px 0 rgba(255, 243, 214, 0.58), 0 14px 26px rgba(70, 50, 20, 0.46);
        }

        .hero-content {
            animation: mobileLoad .5s ease-out both;
        }

        body.is-opening .hero-content {
            animation: mobileOpen 1s ease-in-out both;
        }

        @media (max-width: 900px) {
            .hero {
                background-image: url("assets/galeria-pre/IMG_6552.jpg");
            }
        }

        @media (max-width: 640px) {
            .hero-content {
                width: min(360px, 92vw);
                padding: 1.2rem .9rem;
            }

            .envelope {
                width: min(238px, 72vw);
                margin-bottom: 1rem;
            }

            p {
                font-size: 1rem;
                margin-bottom: .95rem;
            }
        }

        @keyframes mobileLoad {
            0% {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes mobileOpen {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
        }
    </style>
</head>

<body>
    <main class="hero">
        <div class="hero-content">
            <div class="badge">Arianna y H&eacute;ctor</div>

            <div class="envelope" aria-hidden="true">
                <img src="assets/envelope-intro-CB40hjGZ.jpg" alt="" />
            </div>
            <p>Ingresa tu c&oacute;digo de acceso para abrir la invitaci&oacute;n.</p>
            <form id="access-form" class="access-form">
                <label class="sr-only" for="access-code">C&oacute;digo de acceso</label>
                <p class="access-title">C&oacute;digo de Invitado</p>
                <input id="access-code" class="access-input" name="access-code" type="text" placeholder="C&Oacute;DIGO DE ACCESO" autocomplete="off" required />
                <button class="cta" id="access-submit" type="submit">Ingresar</button>
                <p id="access-message" class="access-help" aria-live="polite"></p>
            </form>
        </div>
    </main>

    <script src="rsvp-config.js"></script>
    <script>
        const ACCESS_SESSION_KEY = "invitation_access_granted";
        const DEFAULT_SITE_SETTINGS = {
            habilitar_rsvp: true,
            habilitar_codigo_acceso: true,
        };
        const accessForm = document.getElementById("access-form");
        const accessCodeInput = document.getElementById("access-code");
        const accessSubmit = document.getElementById("access-submit");
        const accessMessage = document.getElementById("access-message");
        const accessApiUrl = (window.ACCESS_API_URL || window.RSVP_API_URL || window.GIFT_API_URL || "").trim();
        let requireAccessCode = DEFAULT_SITE_SETTINGS.habilitar_codigo_acceso;

        const setMessage = (text, isError = false) => {
            if (!accessMessage) return;
            accessMessage.textContent = text;
            accessMessage.classList.toggle("error", isError);
        };

        const toBooleanFlag = (value) => {
            if (value === true) return true;
            if (typeof value === "number") return value !== 0;
            const normalized = String(value || "").trim().toLowerCase();
            return normalized === "true" || normalized === "1" || normalized === "si" || normalized === "sí" || normalized === "yes";
        };

        const openInvitation = () => {
            document.body.classList.add("is-opening");
            setTimeout(() => {
                window.location.href = "invitacion.html?open=1";
            }, 1500);
        };

        const loadSiteSettings = async () => {
            if (!accessApiUrl) return;
            try {
                const separator = accessApiUrl.includes("?") ? "&" : "?";
                const response = await fetch(`${accessApiUrl}${separator}action=settings`, {
                    method: "GET",
                    cache: "no-store",
                });
                const data = await response.json();
                const settings = data && data.settings ? data.settings : DEFAULT_SITE_SETTINGS;
                requireAccessCode = settings.habilitar_codigo_acceso !== false;

                if (!requireAccessCode) {
                    accessCodeInput.value = "";
                    accessCodeInput.disabled = true;
                    accessCodeInput.removeAttribute("required");
                    accessCodeInput.style.display = "none";
                    accessSubmit.textContent = "Abrir";
                    setMessage("Acceso abierto.");
                }
            } catch (error) {
                requireAccessCode = DEFAULT_SITE_SETTINGS.habilitar_codigo_acceso;
            }
        };

        loadSiteSettings();
        const validateAccessCode = async (code) => {
            const payload = JSON.stringify({ action: "access", code });

            const submitViaHiddenForm = () => new Promise((resolve, reject) => {
                const iframeName = `access-submit-${Date.now()}`;
                const iframe = document.createElement("iframe");
                iframe.name = iframeName;
                iframe.style.display = "none";

                const form = document.createElement("form");
                form.method = "POST";
                form.action = accessApiUrl;
                form.target = iframeName;
                form.style.display = "none";

                const input = document.createElement("input");
                input.type = "hidden";
                input.name = "payload";
                input.value = payload;
                form.appendChild(input);

                let settled = false;
                const cleanup = () => {
                    if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
                    if (form.parentNode) form.parentNode.removeChild(form);
                };

                const done = () => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    reject(new Error("No se pudo validar el codigo por CORS/redireccion del Web App. Actualiza la implementacion y URL."));
                };

                const fail = () => {
                    if (settled) return;
                    settled = true;
                    cleanup();
                    reject(new Error("No se pudo validar el codigo en este navegador. Revisa la implementacion del Web App."));
                };

                iframe.addEventListener("load", done, { once: true });
                setTimeout(done, 1800);
                setTimeout(fail, 8000);

                document.body.appendChild(iframe);
                document.body.appendChild(form);
                form.submit();
            });

            try {
                const response = await fetch(accessApiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
                    body: new URLSearchParams({ payload }).toString(),
                });

                const data = await response.json();
                if (!response.ok || !data.ok) {
                    const apiError = new Error(data && data.error ? data.error : "Codigo invalido");
                    apiError.isApiError = true;
                    throw apiError;
                }
                return data;
            } catch (error) {
                if (error && error.isApiError) {
                    throw error;
                }
                return submitViaHiddenForm();
            }
        };

        accessForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            if (!requireAccessCode) {
                sessionStorage.setItem(
                    ACCESS_SESSION_KEY,
                    JSON.stringify({
                        invitado: "",
                        solo: false,
                        at: new Date().toISOString(),
                    })
                );
                openInvitation();
                return;
            }

            const code = accessCodeInput.value.trim();

            if (!code) {
                setMessage("Ingresa tu código de acceso.", true);
                accessCodeInput.focus();
                return;
            }

            if (!accessApiUrl) {
                setMessage("Falta configurar la URL del Apps Script.", true);
                return;
            }

            setMessage("Validando código...");
            accessSubmit.disabled = true;
            const originalText = accessSubmit.textContent;
            accessSubmit.textContent = "Validando...";

            try {
                const data = await validateAccessCode(code);
                sessionStorage.setItem(
                    ACCESS_SESSION_KEY,
                    JSON.stringify({
                        invitado: data.invitado || "",
                        solo: toBooleanFlag(data && data.solo),
                        at: new Date().toISOString(),
                    })
                );
                setMessage(`Bienvenido${data.invitado ? `, ${data.invitado}` : ""}.`);
                openInvitation();
            } catch (error) {
                const rawMessage = error && error.message ? String(error.message) : "";
                const normalizedMessage = rawMessage
                    .toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "");

                if (normalizedMessage.includes("codigo invalido")) {
                    setMessage("C\u00f3digo inv\u00e1lido. Revisa el c\u00f3digo e int\u00e9ntalo nuevamente.", true);
                    if (accessCodeInput) {
                        accessCodeInput.focus();
                        accessCodeInput.select();
                    }
                } else {
                    setMessage(rawMessage || "No pudimos validar el c\u00f3digo.", true);
                }
            } finally {
                accessSubmit.disabled = false;
                accessSubmit.textContent = originalText;
            }
        });
    </script>
</body>

</html>
